name: llama3

on:
  workflow_call:
    inputs:
      run_upload:
        type: boolean
        required: true
    secrets:
      LLAMA3_HF_TOKEN:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e src/llama3/
      - name: Run tests
        run: pytest tests/llama3/

  upload:
    needs: test
    if: inputs.run_upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e src/llama3/
      - name: Upload to Hub
        env:
          LLAMA3_HF_TOKEN: ${{ secrets.LLAMA3_HF_TOKEN }}
        run: python src/llama3/upload_to_hub.py
