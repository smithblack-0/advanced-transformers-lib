name: SHRAM trainability diagnostic

on:
  pull_request:
    paths:
      - "src/shram/**"
      - "tests/shram/**"
      - ".github/workflows/shram_trainability_diagnostic.yml"

jobs:
  targeted-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SHRAM test dependencies
        run: python -m pip install -q -e "src/shram[dev]"
      - name: Run targeted tests and capture transcript
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short -x \
            tests/shram/model/attention/test_router.py \
            tests/shram/model/test_trainability_contracts.py \
            > targeted-pytest.txt 2>&1
          status=$?
          echo "$status" > targeted-pytest-status.txt
          cat targeted-pytest.txt
          exit 0
      - name: Upload targeted test transcript
        uses: actions/upload-artifact@v4
        with:
          name: shram-targeted-pytest
          path: |
            targeted-pytest.txt
            targeted-pytest-status.txt
