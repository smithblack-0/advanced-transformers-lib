name: SHRAM full diagnostic

on:
  pull_request:
    paths:
      - "src/shram/**"
      - "tests/shram/**"
      - ".github/workflows/shram_full_diagnostic.yml"

jobs:
  full-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SHRAM test dependencies
        run: python -m pip install -q -e "src/shram[dev]"
      - name: Run full SHRAM suite and capture first failure
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short -x tests/shram > shram-pytest.txt 2>&1
          status=$?
          echo "$status" > shram-pytest-status.txt
          cat shram-pytest.txt
          exit 0
      - name: Upload full test transcript
        uses: actions/upload-artifact@v4
        with:
          name: shram-full-pytest
          path: |
            shram-pytest.txt
            shram-pytest-status.txt
