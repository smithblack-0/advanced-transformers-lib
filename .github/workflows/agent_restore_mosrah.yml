name: Restore untouched MoSRAH coordinator

on:
  push:
    branches:
      - agent/shram-trainability-fixes

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shram-trainability-fixes
          fetch-depth: 0
      - name: Restore file from master and remove this workflow
        shell: bash
        run: |
          git fetch origin master
          git show origin/master:src/shram/model/attention/mosrah.py > src/shram/model/attention/mosrah.py
          rm .github/workflows/agent_restore_mosrah.yml
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/shram/model/attention/mosrah.py .github/workflows/agent_restore_mosrah.yml
          git commit -m "Remove noisy MoSRAH documentation-only rewrite"
          git push origin HEAD:agent/shram-trainability-fixes
