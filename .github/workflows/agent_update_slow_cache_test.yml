name: Update slow cache contract test

on:
  push:
    branches:
      - agent/shram-trainability-fixes

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shram-trainability-fixes
      - name: Update stale fixed-capacity contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/shram/model/cache/test_slow_mosrah_cache.py")
          raw = path.read_bytes()
          newline = "\r\n" if b"\r\n" in raw else "\n"
          text = raw.decode("utf-8").replace("\r\n", "\n")

          replacements = [
              (
                  "- get_max_cache_shape() raises NotImplementedError\n",
                  "- get_max_length() and get_max_cache_shape() return the fixed buffer capacity\n",
              ),
              (
                  "def test_get_max_cache_shape_raises():\n    \"\"\"get_max_cache_shape() raises NotImplementedError — cache is unbounded.\"\"\"\n    cache = make_cache()\n    with pytest.raises(NotImplementedError):\n        cache.get_max_cache_shape()\n",
                  "def test_max_length_contract_returns_fixed_buffer_capacity():\n    \"\"\"Both current and deprecated interfaces report the fixed capacity.\"\"\"\n    cache = make_cache()\n    assert cache.get_max_length() == CACHE_LENGTH\n    assert cache.get_max_cache_shape() == CACHE_LENGTH\n",
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected exactly one replacement target, found {count}")
              text = text.replace(old, new)

          path.write_bytes(text.replace("\n", newline).encode("utf-8"))
          Path(".github/workflows/agent_update_slow_cache_test.yml").unlink()
          PY
      - name: Commit corrected test contract
        shell: bash
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/shram/model/cache/test_slow_mosrah_cache.py .github/workflows/agent_update_slow_cache_test.yml
          git commit -m "Correct slow cache fixed-capacity contract test"
          git push origin HEAD:agent/shram-trainability-fixes
